<!-- Header -->
<header id="main-header">
    <div class="header-inner">

        <div id="logo">
            <div class="logo-box logo-jp">
                <div class="logo-jp-grid">
                    <span>&#12518;</span><span>&#12491;</span>
                    <span>&#12463;</span><span>&#12525;</span>
                </div>
            </div>
            <div class="logo-box logo-en">
                <div class="logo-en-text">
                    <span>UNI</span><span>QLO</span>
                </div>
            </div>
        </div>

        <nav class="header-nav">
            <button class="nav-item" data-menu="NU">NỮ<div class="underline-anim"></div></button>
            <button class="nav-item" data-menu="NAM">NAM<div class="underline-anim"></div></button>
            <button class="nav-item" data-menu="TRE EM">TRẺ EM<div class="underline-anim"></div></button>
            <button class="nav-item" data-menu="EM BE">EM BÉ<div class="underline-anim"></div></button>
        </nav>

        <div class="header-actions-wrapper">
            <div id="header-actions">
                <button id="open-search" class="header-icon-btn" aria-label="Search">
                    <span class="hicon hicon-search"></span>
                </button>
                <button class="header-icon-btn" aria-label="Wishlist">
                    <span class="hicon hicon-heart"></span>
                </button>
                <button class="header-icon-btn" aria-label="Account">
                    <span class="hicon hicon-user"></span>
                </button>
                <button class="header-icon-btn" aria-label="Cart">
                    <span class="hicon hicon-cart"></span>
                    <span class="cart-badge">1</span>
                </button>
                <button class="header-icon-btn" aria-label="Menu">
                    <span class="hicon hicon-menu"></span>
                </button>
            </div>
        </div>

    </div>
</header>
